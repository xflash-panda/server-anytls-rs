version: 2
registries:
  xflash-panda-git:
    type: git
    url: https://github.com
    username: x-access-token
    password: ${{secrets.XFLASH_PANDA_REPO_TOKEN}}

updates:
  - package-ecosystem: cargo
    directory: /
    registries:
      - xflash-panda-git
    schedule:
      interval: weekly
    target-branch: dev/master
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: cargo
    directory: /
    registries:
      - xflash-panda-git
    schedule:
      interval: weekly
    target-branch: dev/agent-master
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: dev/master
    open-pull-requests-limit: 5
    labels:
      - ci
    commit-message:
      prefix: "chore(ci):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: dev/agent-master
    open-pull-requests-limit: 5
    labels:
      - ci
    commit-message:
      prefix: "chore(ci):"